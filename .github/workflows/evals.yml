name: evals

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  retrieval-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt pytest

      - name: Run eval gates
        env:
          # Embedding calls: one batched request for the 50 golden questions —
          # comfortably inside the Gemini free tier.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pytest evals -v
